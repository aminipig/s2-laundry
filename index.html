<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบัญชี ร้าน S2 ซักอบรีด v0.02</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>
<body class="bg-sky-50 font-sans antialiased text-gray-800">

    <div id="login-screen" class="flex flex-col items-center justify-center h-screen bg-white p-4">
        <div class="bg-white p-10 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.05)] border border-sky-100 max-w-sm w-full text-center">
            <div class="text-5xl mb-4">🧺</div>
            <h2 class="text-2xl font-bold text-sky-900 mb-1">ร้าน S2 ซักอบรีด</h2>
            <p class="text-sm text-sky-500 mb-8">ระบบบัญชีร้านแบบมืออาชีพ</p>
            
            <button id="btn-login-google" class="w-full flex items-center justify-center gap-3 bg-sky-600 hover:bg-sky-700 text-white font-semibold py-3 px-4 rounded-xl transition duration-200 cursor-pointer text-sm shadow-lg shadow-sky-200">
                ลงชื่อเข้าใช้ด้วย Google Account
            </button>
        </div>
    </div>

    <header id="top-navbar" class="bg-white border-b border-sky-100 shadow-sm sticky top-0 z-50 hidden">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🧺</span>
                <div>
                    <h2 class="font-bold text-sky-900 text-sm">S2 Laundry</h2>
                    <p class="text-[10px] text-sky-500 font-mono">v0.02</p>
                </div>
            </div>
            <button id="btn-logout" class="bg-sky-50 hover:bg-sky-100 text-sky-700 px-4 py-1.5 rounded-lg text-xs font-medium transition cursor-pointer">ออกจากระบบ</button>
        </div>
    </header>

    <main id="main-app" class="max-w-7xl mx-auto px-4 py-8 hidden">
        <h1 class="text-2xl font-bold text-sky-900 mb-8">สรุปบัญชีร้าน S2 ซักอบรีด 🧺</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl border border-sky-100 shadow-sm">
                <p class="text-xs font-semibold text-sky-400 uppercase tracking-wider">รายรับรวม</p>
                <p class="text-3xl font-bold text-sky-700 mt-2">฿<span id="total-income">0.00</span></p>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-sky-100 shadow-sm">
                <p class="text-xs font-semibold text-sky-400 uppercase tracking-wider">รายจ่ายรวม</p>
                <p class="text-3xl font-bold text-sky-700 mt-2">฿<span id="total-expense">0.00</span></p>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-sky-100 shadow-sm">
                <p class="text-xs font-semibold text-sky-400 uppercase tracking-wider">กำไรสุทธิ</p>
                <p class="text-3xl font-bold text-sky-700 mt-2">฿<span id="net-profit">0.00</span></p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-sky-100 h-fit">
                <h3 class="text-md font-semibold mb-5 text-sky-900">บันทึกรายการ</h3>
                <form id="finance-form" class="space-y-4">
                    <input type="date" id="date" required class="w-full p-2.5 border border-sky-200 rounded-xl bg-sky-50">
                    <select id="type" class="w-full p-2.5 border border-sky-200 rounded-xl bg-sky-50">
                        <option value="income">รายรับ</option>
                        <option value="expense">รายจ่าย</option>
                    </select>
                    <input type="text" id="description" placeholder="รายละเอียดรายการ" required class="w-full p-2.5 border border-sky-200 rounded-xl bg-sky-50">
                    <input type="number" id="amount" placeholder="จำนวนเงิน (บาท)" required class="w-full p-2.5 border border-sky-200 rounded-xl bg-sky-50">
                    <button type="submit" class="w-full bg-sky-600 text-white p-2.5 rounded-xl hover:bg-sky-700 cursor-pointer font-medium">บันทึก</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-sky-100 lg:col-span-2">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-sky-400 text-[10px] uppercase tracking-widest border-b border-sky-50">
                                <th class="p-3">วันที่</th><th class="p-3">รายการ</th><th class="p-3 text-right">จำนวน</th><th class="p-3 text-center">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="transaction-table-body" class="divide-y divide-sky-50 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        console.log("S2 Laundry v0.02 - Theme Blue/White Initialized");
    </script>
</body>
</html>
