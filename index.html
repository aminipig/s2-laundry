<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบัญชี ร้าน S2 ซักอบรีด v0.01</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-800">

    <div id="login-screen" class="flex flex-col items-center justify-center h-screen bg-linear-to-br from-blue-500 via-cyan-500 to-teal-500 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center border border-gray-100">
            <div class="text-4xl mb-3">🧺</div>
            <h2 class="text-2xl font-bold text-gray-900 mb-1">ร้าน S2 ซักอบรีด</h2>
            <p class="text-sm text-gray-500 mb-6">ระบบบัญชีรายรับ-รายจ่ายภายในร้าน</p>
            <button id="btn-login-google" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 hover:border-gray-400 text-gray-700 font-semibold py-2.5 px-4 rounded-xl shadow-xs cursor-pointer text-sm">
                ลงชื่อเข้าใช้ด้วย Google Account
            </button>
        </div>
    </div>

    <header id="top-navbar" class="bg-gray-900 text-white shadow-md sticky top-0 z-50 hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2.5">
                <span class="text-2xl">🧺</span>
                <div>
                    <h2 class="font-bold text-sm sm:text-base">S2 Laundry Accounting</h2>
                </div>
            </div>
            <button id="btn-logout" class="bg-red-600/20 text-red-400 px-3 py-1.5 rounded-lg text-xs font-medium cursor-pointer">🚪 ออกระบบ</button>
        </div>
    </header>

    <main id="main-app" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 hidden">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">ระบบบัญชีร้าน S2 ซักอบรีด 🧺</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-green-50 p-6 rounded-2xl border border-green-200">
                <p class="text-sm text-green-600">รายรับรวม (ปี <span class="view-year"></span>)</p>
                <p class="text-3xl font-bold text-green-700">฿<span id="total-income">0.00</span></p>
            </div>
            <div class="bg-red-50 p-6 rounded-2xl border border-red-200">
                <p class="text-sm text-red-600">รายจ่ายรวม (ปี <span class="view-year"></span>)</p>
                <p class="text-3xl font-bold text-red-700">฿<span id="total-expense">0.00</span></p>
            </div>
            <div class="bg-blue-50 p-6 rounded-2xl border border-blue-200">
                <p class="text-sm text-blue-600">กำไรสุทธิ (ปี <span class="view-year"></span>)</p>
                <p class="text-3xl font-bold text-blue-700">฿<span id="net-profit">0.00</span></p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow-xs border border-gray-100 mb-8">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold">กราฟสรุปรายเดือน</h3>
                <select id="year-filter" class="border p-1 rounded-md"></select>
            </div>
            <div class="h-64"><canvas id="financeChart"></canvas></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-gray-100 h-fit">
                <h3 class="text-lg font-semibold mb-4" id="form-title">บันทึกรายการใหม่</h3>
                <form id="finance-form" class="space-y-4">
                    <input type="hidden" id="edit-id">
                    <input type="date" id="date" required class="w-full p-2 border rounded-md">
                    <select id="type" class="w-full p-2 border rounded-md">
                        <option value="income">รายรับ</option>
                        <option value="expense">รายจ่าย</option>
                    </select>
                    <input type="text" id="description" placeholder="รายละเอียดรายการ" required class="w-full p-2 border rounded-md">
                    <input type="number" id="amount" placeholder="จำนวนเงิน" required class="w-full p-2 border rounded-md">
                    <input type="text" id="notes" placeholder="หมายเหตุ" class="w-full p-2 border rounded-md">
                    <button type="submit" id="btn-submit" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 cursor-pointer">บันทึกข้อมูล</button>
                    <button type="button" id="btn-cancel-edit" class="w-full bg-gray-200 p-2 rounded-md hidden cursor-pointer">ยกเลิก</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-xs border border-gray-100 lg:col-span-2">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-semibold">ประวัติรายการ</h3>
                    <button id="btn-export" class="bg-emerald-600 text-white px-3 py-1 rounded-md text-sm">Excel</button>
                </div>
                <div class="overflow-x-auto"><table class="w-full text-left">
                    <thead><tr class="text-gray-500 uppercase text-sm border-b"><th class="p-3">วันที่</th><th class="p-3">รายการ</th><th class="p-3 text-right">จำนวน</th><th class="p-3 text-center">จัดการ</th></tr></thead>
                    <tbody id="transaction-table-body"></tbody>
                </table></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqqZS_MmWqPw4G0EzTfWxsyp5AXiI5SEA",
            authDomain: "salon-accounting-f44bd.firebaseapp.com",
            projectId: "salon-accounting-f44bd",
            storageBucket: "salon-accounting-f44bd.firebasestorage.app",
            messagingSenderId: "1098548783182",
            appId: "1:1098548783182:web:06c13ddb48c68ff7ee7b1f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        // --- จุดเปลี่ยนสำคัญ ---
        const recordsCollection = collection(db, "s2_laundry_records");
        // -----------------------

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('top-navbar').classList.remove('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                startSync();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('top-navbar').classList.add('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        document.getElementById('btn-login-google').addEventListener('click', () => signInWithPopup(auth, new GoogleAuthProvider()));
        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        function startSync() {
            onSnapshot(recordsCollection, (snapshot) => {
                window.transactions = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    data.id = doc.id;
                    window.transactions.push(data);
                });
                renderUI();
            });
        }

        function renderUI() {
            const tbody = document.getElementById('transaction-table-body');
            tbody.innerHTML = '';
            let totalIncome = 0, totalExpense = 0;
            
            window.transactions.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(t => {
                if(t.type === 'income') totalIncome += t.amount; else totalExpense += t.amount;
                tbody.innerHTML += `<tr>
                    <td class="p-3">${t.date.substring(0,10)}</td><td class="p-3">${t.description}</td>
                    <td class="p-3 text-right ${t.type === 'income' ? 'text-green-600' : 'text-red-600'}">${t.amount.toLocaleString()}</td>
                    <td class="p-3 text-center"><button onclick="deleteDoc(doc(db, 's2_laundry_records', '${t.id}'))" class="text-red-500 cursor-pointer">🗑️</button></td>
                </tr>`;
            });
            document.getElementById('total-income').innerText = totalIncome.toLocaleString();
            document.getElementById('total-expense').innerText = totalExpense.toLocaleString();
            document.getElementById('net-profit').innerText = (totalIncome - totalExpense).toLocaleString();
        }

        document.getElementById('finance-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await addDoc(recordsCollection, {
                date: document.getElementById('date').value,
                type: document.getElementById('type').value,
                description: document.getElementById('description').value,
                amount: parseFloat(document.getElementById('amount').value),
                notes: document.getElementById('notes').value
            });
            document.getElementById('finance-form').reset();
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
        });

        document.getElementById('date').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
