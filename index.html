<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบัญชี ร้าน S2 ซักอบรีด</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-800">

    <div id="login-screen" class="flex flex-col items-center justify-center h-screen bg-linear-to-br from-blue-500 via-sky-500 to-indigo-500 p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center border border-gray-100">
            <div class="text-5xl mb-4">🧺</div>
            <h2 class="text-2xl font-bold text-gray-900 mb-1">ร้าน S2 ซักอบรีด</h2>
            <p class="text-sm text-gray-500 mb-6">ระบบบัญชีรายรับ-รายจ่าย</p>
            <button id="btn-login-google" class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 hover:border-gray-400 text-gray-700 font-semibold py-3 px-4 rounded-xl shadow-xs transition cursor-pointer text-sm">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#EA4335" d="M12.24 10.285V14.4h6.887c-.275 1.565-1.88 4.604-6.887 4.604-4.33 0-7.866-3.577-7.866-8s3.536-8 7.866-8c2.46 0 4.105 1.025 5.047 1.926l3.227-3.111C18.29 1.157 15.485 0 12.24 0 5.58 0 0 5.37 0 12s5.58 12 12.24 12c6.96 0 11.57-4.854 11.57-11.77 0-.789-.085-1.39-.188-1.945H12.24z"/></svg>
                ลงชื่อเข้าใช้ด้วย Google Account
            </button>
        </div>
    </div>

    <header id="top-navbar" class="bg-gray-900 text-white shadow-md sticky top-0 z-50 hidden">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-2xl">🧺</span>
                <h2 class="font-bold">S2 Laundry Accounting</h2>
            </div>
            <button id="btn-logout" class="bg-red-600/20 text-red-400 px-3 py-1.5 rounded-lg text-xs font-medium cursor-pointer">🚪 ออกระบบ</button>
        </div>
    </header>

    <main id="main-app" class="max-w-7xl mx-auto px-4 py-8 hidden">
        <h1 class="text-3xl font-bold mb-8">ระบบบัญชี S2 ซักอบรีด 🧺</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-green-50 p-6 rounded-2xl border border-green-200">
                <p class="text-sm text-green-600">รายรับรวม (ปี <span class="view-year"></span>)</p>
                <p class="text-3xl font-bold text-green-700">฿<span id="total-income">0.00</span></p>
            </div>
            <div class="bg-red-50 p-6 rounded-2xl border border-red-200">
                <p class="text-sm text-red-600">รายจ่ายรวม (ปี <span class="view-year"></span>)</p>
                <p class="text-3xl font-bold text-red-700">฿<span id="total-expense">0.00</span></p>
            </div>
            <div class="bg-blue-50 p-6 rounded-2xl border border-blue-200">
                <p class="text-sm text-blue-600">กำไรสุทธิ (ปี <span class="view-year"></span>)</p>
                <p class="text-3xl font-bold text-blue-700">฿<span id="net-profit">0.00</span></p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-2xl border border-gray-100">
                <h3 class="text-lg font-semibold mb-4" id="form-title">บันทึกรายการใหม่</h3>
                <form id="finance-form" class="space-y-4">
                    <input type="hidden" id="edit-id">
                    <input type="date" id="date" required class="w-full p-2 border rounded-md">
                    <select id="type" class="w-full p-2 border rounded-md">
                        <option value="income">รายรับ</option>
                        <option value="expense">รายจ่าย</option>
                    </select>
                    <input type="text" id="description" placeholder="รายละเอียด" required class="w-full p-2 border rounded-md">
                    <input type="number" id="amount" placeholder="จำนวนเงิน" required class="w-full p-2 border rounded-md">
                    <button type="submit" id="btn-submit" class="w-full bg-sky-600 text-white p-2 rounded-md font-medium cursor-pointer">บันทึกข้อมูล</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-2xl border border-gray-100 lg:col-span-2 overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-gray-500 border-b">
                            <th class="p-3">วันที่</th>
                            <th class="p-3">รายการ</th>
                            <th class="p-3">ยอด</th>
                            <th class="p-3">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="transaction-table-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        // Firebase Config - *อย่าลืมใส่ค่าของคุณ*
        const firebaseConfig = {
            apiKey: "AIzaSyDqqZS_MmWqPw4G0EzTfWxsyp5AXiI5SEA",
            authDomain: "salon-accounting-f44bd.firebaseapp.com",
            projectId: "salon-accounting-f44bd",
            storageBucket: "salon-accounting-f44bd.firebasestorage.app",
            messagingSenderId: "1098548783182",
            appId: "1:1098548783182:web:06c13ddb48c68ff7ee7b1f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        const recordsCollection = collection(db, "s2_laundry_records");
        const logCollection = collection(db, "s2_laundry_activity_logs");

        // Logic พื้นฐานทำงานเหมือนเดิมครับ
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('top-navbar').classList.remove('hidden');
                document.getElementById('main-app').classList.remove('hidden');
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('top-navbar').classList.add('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        document.getElementById('btn-login-google').addEventListener('click', () => signInWithPopup(auth, googleProvider));
        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        // ตัวอย่างการเพิ่มข้อมูล
        document.getElementById('finance-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                date: document.getElementById('date').value,
                type: document.getElementById('type').value,
                description: document.getElementById('description').value,
                amount: parseFloat(document.getElementById('amount').value)
            };
            await addDoc(recordsCollection, payload);
            alert("บันทึกสำเร็จ!");
        });

        document.getElementById('date').value = new Date().toISOString().split('T')[0];
    </script>
</body>
</html>
