<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบัญชี ร้าน S2 ซักอบรีด v0.01 (Supabase Powered)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 font-sans antialiased text-gray-800">

    <div id="login-screen" class="flex flex-col items-center justify-center h-screen bg-linear-to-br from-sky-400 via-blue-500 to-emerald-400 p-4">
        <div class="bg-white/95 p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center border border-white/20 backdrop-blur-xs transform transition-all">
            <div class="text-5xl mb-4 animate-bounce">🧺</div>
            <h2 class="text-2xl font-bold text-slate-900 mb-1">ร้าน S2 ซักอบรีด</h2>
            <p class="text-sm text-slate-600 mb-6">ระบบบัญชีรายรับ-รายจ่ายภายในร้าน <span class="bg-slate-700 text-white text-[10px] px-2 py-0.5 rounded-md font-bold ml-1 tracking-wide shadow-xs border border-slate-600/30">v0.01</span></p>
            
            <button id="btn-login-google" class="w-full flex items-center justify-center gap-3 bg-white border border-slate-200 hover:border-sky-400 text-slate-700 font-semibold py-2.5 px-4 rounded-xl shadow-xs hover:shadow-md transition duration-200 cursor-pointer text-sm">
                ลงชื่อเข้าใช้ด้วย Google Account
            </button>
        </div>
    </div>

    <header id="top-navbar" class="bg-emerald-950 text-white shadow-md sticky top-0 z-50 hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <h2 class="font-bold text-base tracking-wide text-white">S2 Laundry Accounting v0.01</h2>
            <button id="btn-logout" class="bg-red-600/20 text-red-300 px-3 py-1.5 rounded-lg text-xs font-medium cursor-pointer">🚪 ออกระบบ</button>
        </div>
    </header>

    <main id="main-app" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 hidden">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-xs border border-slate-100">
                <h3 class="text-lg font-semibold mb-4 text-slate-800" id="form-title">บันทึกรายการใหม่</h3>
                <form id="finance-form" class="space-y-4">
                    <input type="hidden" id="edit-id" value="">
                    <div>
                        <label class="block text-sm font-medium text-slate-700">วันที่</label>
                        <input type="date" id="date" required class="mt-1 block w-full p-2 border border-slate-300 rounded-md shadow-xs bg-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">ประเภท</label>
                        <select id="type" class="mt-1 block w-full p-2 border border-slate-300 rounded-md shadow-xs">
                            <option value="income">รายรับ</option>
                            <option value="expense">รายจ่าย</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">ช่องทางการชำระเงิน</label>
                        <select id="payment-method" class="mt-1 block w-full p-2 border border-slate-300 rounded-md shadow-xs bg-white">
                            <option value="เงินสด">💵 เงินสด</option>
                            <option value="เงินโอน">💰 เงินโอน</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">รายละเอียด</label>
                        <input type="text" id="description" required class="mt-1 block w-full p-2 border border-slate-300 rounded-md shadow-xs">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700">จำนวนเงิน</label>
                        <input type="number" id="amount" required class="mt-1 block w-full p-2 border border-slate-300 rounded-md shadow-xs">
                    </div>
                    <button type="submit" id="btn-submit" class="w-full bg-sky-600 text-white p-2 rounded-md font-medium cursor-pointer">บันทึกข้อมูล</button>
                </form>
            </div>

            <div class="lg:col-span-2 overflow-x-auto bg-white p-6 rounded-2xl shadow-xs border border-slate-100">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-600 text-sm uppercase">
                            <th class="p-3">วันที่</th>
                            <th class="p-3">รายการ</th>
                            <th class="p-3">ประเภท</th>
                            <th class="p-3 text-right">จำนวนเงิน</th>
                            <th class="p-3 text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="transaction-table-body" class="divide-y divide-slate-100 text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = "https://siinyeuyvzzhstjzcwdo.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_GWMnCCLeCC36JkbneN0orA_Jffu2Fxg"; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function checkAuthState() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('top-navbar').classList.remove('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                fetchData();
            }
        }

        async function fetchData() {
            const { data } = await _supabase.from('s2_records').select('*').order('date', { ascending: false });
            const tbody = document.getElementById('transaction-table-body');
            tbody.innerHTML = (data || []).map(t => `
                <tr>
                    <td class="p-3 text-gray-800">${t.date.substring(0, 10)}</td>
                    <td class="p-3 text-slate-700 font-medium">${t.description}</td>
                    <td class="p-3 text-xs">${t.type === 'income' ? 'รายรับ' : 'รายจ่าย'}</td>
                    <td class="p-3 text-right font-semibold ${t.type === 'income' ? 'text-emerald-600' : 'text-rose-600'}">฿${Number(t.amount).toLocaleString()}</td>
                    <td class="p-3 text-center"><button onclick="deleteRow('${t.id}')" class="text-rose-600 cursor-pointer">🗑️</button></td>
                </tr>
            `).join('');
        }

        document.getElementById('finance-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                date: document.getElementById('date').value + " " + new Date().toTimeString().split(' ')[0],
                type: document.getElementById('type').value,
                paymentMethod: document.getElementById('payment-method').value,
                description: document.getElementById('description').value,
                amount: parseFloat(document.getElementById('amount').value)
            };
            await _supabase.from('s2_records').insert([payload]);
            window.location.reload();
        });

        window.deleteRow = async (id) => { if(confirm('ลบรายการ?')) { await _supabase.from('s2_records').delete().eq('id', id); window.location.reload(); }};

        window.resetFormMode = function() {
            const today = new Date();
            document.getElementById('date').value = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        }

        document.getElementById('btn-login-google').addEventListener('click', () => _supabase.auth.signInWithOAuth({ provider: 'google' }));
        document.getElementById('btn-logout').addEventListener('click', () => _supabase.auth.signOut().then(() => window.location.reload()));
        
        checkAuthState();
        window.resetFormMode();
    </script>
</body>
</html>
